<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Contract - ContractEase</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/contract.css">
</head>
<body class="bg-page dashboard-layout">
  
  <nav class="navbar">
    <div class="navbar-container">
      <a href="user-dashboard.html" class="navbar-logo">
        <span class="navbar-logo-icon"></span>
        ContractEase
      </a>
      
      <button class="mobile-menu-toggle" id="mobileMenuBtn" aria-controls="navbarMenu" aria-expanded="false" aria-label="Open mobile menu">☰</button>
      
      <div class="navbar-menu" id="navbarMenu" aria-hidden="true">
        <a href="user-dashboard.html" class="navbar-link">Dashboard</a>
        <a href="create-contract.html" class="navbar-link active">Create Contract</a>
        
        <div class="navbar-user">
          <div class="user-avatar" id="userAvatar">U</div>
          <button id="logoutBtn" class="logout-btn">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="dashboard-main dashboard-container">
    <div class="contract-editor">
      <div class="editor-header">
        <div class="editor-breadcrumb">
          <a href="user-dashboard.html" class="breadcrumb-link">Dashboard</a>
          <span class="breadcrumb-separator">/</span>
          <span>Draft New Contract</span>
        </div>
        <h1 class="editor-title">Create New Contract</h1>
      </div>

      <!-- Step Progress -->
      <div class="progress-steps" id="progressSteps">
        <div class="progress-step active" data-step="1">
          <div class="step-number">1</div>
          <span class="step-label">Select Type</span>
        </div>
      </div>

      <!-- Step 1: Contract Type Selection -->
      <div class="form-section" id="step-1">
        <h2 class="form-section-title">Select Contract Type</h2>
        <div class="contract-type-grid" id="contractTypeGrid" role="radiogroup">
          <label class="contract-type-option" data-type="service">
            <input type="radio" name="contractType" value="service" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">💼</div>
            <div class="contract-type-name">Service Agreement</div>
            <div class="contract-type-description">For providing professional B2B services</div>
          </label>
          <label class="contract-type-option" data-type="nda">
            <input type="radio" name="contractType" value="nda" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">🔒</div>
            <div class="contract-type-name">NDA Agreement</div>
            <div class="contract-type-description">For mutual confidentiality</div>
          </label>
          <label class="contract-type-option" data-type="license">
            <input type="radio" name="contractType" value="license" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">📜</div>
            <div class="contract-type-name">License Agreement</div>
            <div class="contract-type-description">For software or content licensing</div>
          </label>
          <label class="contract-type-option" data-type="employment">
            <input type="radio" name="contractType" value="employment" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">👔</div>
            <div class="contract-type-name">Employment</div>
            <div class="contract-type-description">For hiring new W2 employees</div>
          </label>
          <label class="contract-type-option" data-type="partnership">
            <input type="radio" name="contractType" value="partnership" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">🤝</div>
            <div class="contract-type-name">Partnership</div>
            <div class="contract-type-description">For LLC or business partnerships</div>
          </label>
          <label class="contract-type-option" data-type="custom">
            <input type="radio" name="contractType" value="custom" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">✏️</div>
            <div class="contract-type-name">Custom Contract</div>
            <div class="contract-type-description">Start from a blank template</div>
          </label>
          <label class="contract-type-option" data-type="house_sale">
            <input type="radio" name="contractType" value="house_sale" style="opacity:0; position:absolute; width:0; height:0;">
            <div class="contract-type-icon">🏠</div>
            <div class="contract-type-name">House Sale Agreement</div>
            <div class="contract-type-description">Structured form for property sale contracts</div>
          </label>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <div class="form-actions-left">
        </div>
        <div class="form-actions-right">
          <button class="btn btn-outline-danger" id="cancelDraftBtn">Cancel</button>
          <button class="btn btn-primary" id="nextBtn">Continue <span style="margin-left:8px;">→</span></button>
        </div>
      </div>
    </div>
  </main>

  <!-- Contract Action Modal -->
  <div id="actionModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <!-- Not strictly needed for creation, but kept for consistency -->
  </div>

  <script src="../js/config.js"></script>
  <script>
    window.CONTRACT_PAGE_CONFIG = {
      isTypeSelectionPage: true,
    };
  </script>
  <script src="../js/contract.js"></script>
</body>
</html>
